name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

jobs:
  publish-node:
    name: Publish Custom Node
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Stamp release version from tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["GITHUB_REF_NAME"].strip()
          normalized_tag = tag[1:] if tag.startswith("v") else tag

          if not re.fullmatch(r"\d+\.\d+\.\d+", normalized_tag):
              print(
                  f"Tag '{tag}' does not look like a release version.",
                  file=sys.stderr,
              )
              sys.exit(1)

          def stamp_version(path_str: str) -> None:
              path = pathlib.Path(path_str)
              content = path.read_text(encoding="utf-8")
              updated, count = re.subn(
                  r'(?m)^(version\s*=\s*")[^"]+(")\s*$',
                  rf"\g<1>{normalized_tag}\2",
                  content,
                  count=1,
              )
              if count != 1:
                  raise RuntimeError(f"Could not stamp version in {path}")
              path.write_text(updated, encoding="utf-8")

          stamp_version("pyproject.toml")
          stamp_version("runtime_env/pyproject.toml")

          version_line = next(
              line
              for line in pathlib.Path("pyproject.toml").read_text(encoding="utf-8").splitlines()
              if line.strip().startswith("version")
          )

          if f'"{normalized_tag}"' not in version_line:
              print(
                  f"Tag '{tag}' does not match stamped pyproject version.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Publishing version {normalized_tag} from tag {tag}.")
          PY

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
